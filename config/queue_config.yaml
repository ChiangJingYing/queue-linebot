server:
  host: 0.0.0.0
  port: 8000
  debug: false

queue:
  max_capacity: 50
  timeout_minutes: 30
  timeout_action: remove
  # 特殊叫號規則：
  # - 只作用在 /admin/serve（叫下一位）
  # - 目前 target 以 user_profiles.display_name 精準匹配
  # - 同一個 admin 可配置多個 target
  # - LINE 與 Telegram 共用同一份 admin_id -> targets 規則表
  special_serve_rules:
    enabled: true
    match_field: display_name
    skip_message: "警告此人會哭😭，已為您跳過"
    no_next_reply: "警告此人會哭😭，我想幫你跳過，但後面沒人啦\n裝忙一下唄"
    admins: 
      U02c90a1b735115e6396ca4f05df30932:
        targets:
          - "114106135" # 彭
          - "114106102" # 呂


vip:
  enabled: true
  coffee_price: 60
  coffee_url: https://buymeacoffee.com/yourname

registration:
  location_options:
    '1': ['1', '2', '3', '4', '5', '6', '7']
    '2': ['1', '2', '3', '4', '5', '6', '7']
    '3': ['1', '2', '3', '4', '5', '6', '7', '8']
    '4': ['1', '2', '3', '4', '5', '6', '7', '8']
    '5': ['1', '2', '3', '4', '5', '6', '7', '8']
    '6': ['1', '2', '3', '4', '5', '6', '7', '8']
    '7': ['1', '2', '3', '4', '5', '6', '7', '8']

logging:
  level: INFO
  log_file: logs/queue_events.log
  max_size_mb: 10
  backup_count: 5

web_ui:
  protect_read_routes: false
  allow_query_token: false
  session_cookie_name: queue_admin_session

line_bot:
  # 控制 LINE 使用者在「被叫號」時是否額外收到 push。
  # 設為 false 時：
  # - admin / user 一般 webhook reply 仍正常可用
  # - admin ping 仍可送出
  # - rich menu 綁定仍正常
  push_on_served: false

# Bot tokens / secrets should stay in .env
# line_bot / telegram_bot / discord_bot sections are allowed here only for
# non-sensitive toggles if you add them later.
