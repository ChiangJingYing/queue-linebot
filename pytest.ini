[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=core
    --cov=services
    --cov-report=term-missing
    --maxfail=5
    --durations=10

markers =
    slow: slow tests
    integration: integration tests
    e2e: end-to-end tests
    unit: unit tests
    performance: performance tests
